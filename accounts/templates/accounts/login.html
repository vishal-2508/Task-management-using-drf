<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }

        .login-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container h2 {
            text-align: center;
            color: #2575fc;
            margin-bottom: 25px;
            font-size: 26px;
        }

        #null_field {
            color: #e63946;
            font-size: 13px;
            text-align: center;
            min-height: 18px;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-group input:focus {
            border-color: #2575fc;
            box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.15);
        }

        #submitbtn {
            width: 100%;
            padding: 12px;
            background: #2575fc;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s, transform 0.1s;
        }

        #submitbtn:hover {
            background: #1a5cd8;
        }

        #submitbtn:active {
            transform: scale(0.98);
        }

        .footer-link {
            text-align: center;
            margin-top: 18px;
        }

        a.previous {
            text-decoration: none;
            display: inline-block;
            padding: 8px 16px;
            color: #2575fc;
            font-weight: 600;
            border-radius: 6px;
            transition: background 0.2s;
        }

        a.previous:hover {
            background-color: #eef3ff;
            color: #1a5cd8;
        }
    </style>

</head>

    <body>
        <div class="login-container">
            <h2>Login page</h2>
            <b><p id="null_field"></p></b>

            <div class="input-group">
                <label for="username">User Name</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button id="submitbtn" type="submit">Login</button>

            <div class="footer-link">
                <a href="{% url 'registration_page' %}" class="previous">Registration &raquo;</a>
            </div>
        </div>
    </body>

</html>




<script>


    $(document).ready(function() {
        
        $("#submitbtn").click(function(event) {
            var username = $("#username").val();
            var password = $("#password").val();
            if(username != '' &&  password != ''  ){
                var payload = {
                    "username" : username,
                    "password" : password
                }
                $.ajax({
                url: '/login/', // Replace with your API endpoint
                method: 'POST', // HTTP method (GET, POST, PUT, DELETE, etc.)
                dataType: 'json', // Expected data type of the response (e.g., 'json', 'xml', 'html')
                data : payload, // Data to be sent in the request body
                success: function(response) {
                    // This function is executed if the request is successful
                    console.log('API call successful:', response);
                    localStorage.setItem('accessToken', response.access);
                    localStorage.setItem('refreshToken', response.refresh);
                    // This ajax call to get user type and set as userType in localStorage
                    $.ajax({
                        url: `/task/users_profile/${username}/`,
                        method: 'GET', // or 'POST', 'PUT', etc.
                        dataType: 'json', // or 'text', 'html', etc.
                        headers: {
                                    "Authorization": "Bearer " + response.access
                                },
                        success: function(data) {
                            localStorage.setItem('userType', data[0].user_type);
                            // localStorage.setItem('userType', data[0].user_type);
                            window.location.replace('/task/dashboard_page/');
                        },
                        error: function(xhr, status, error) {
                        console.error("AJAX error:", status, error);
                        }
                    })
                },
                error: function(xhr, status, error) {
                    // This function is executed if the request fails
                    console.error('API call failed:', status, error);
                    $("#null_field").text("Please enter correct username and password");
                    // Handle the error appropriately
                },
                complete: function() {
                    // This function is executed regardless of success or failure
                    console.log('API call completed.');
                }
                });
            }else{
                    $("#null_field").text("Please fill all requied field");
            }
        });
    });







</script>
